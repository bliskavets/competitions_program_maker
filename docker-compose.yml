services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sumo
      POSTGRES_PASSWORD: sumo
      POSTGRES_DB: sumo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumo"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sumo:sumo@db:5432/sumo
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-secret-change-me}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      PAGE_SIZE: ${PAGE_SIZE:-10}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  pgdata:
