# Render.com Blueprint — one free web service + one free PostgreSQL.
# Deploy: push to GitHub, then on render.com → "New +" → "Blueprint" → pick this repo.
services:
  - type: web
    name: sumo-protokoly
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_BACKEND
        value: console
      - key: PAGE_SIZE
        value: "10"
      - key: DATABASE_URL
        fromDatabase:
          name: sumo-db
          property: connectionString

databases:
  - name: sumo-db
    plan: free
    databaseName: sumo
    user: sumo
